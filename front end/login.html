<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Anderson Diagnostics</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,600,700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: #F58220;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-area img { max-height: 60px; object-fit: contain; }
    .logo-area h1 { font-size: 1.3em; font-weight: 700; color: #1b4b8c; margin-top: 10px; }
    .logo-area p  { font-size: 13px; color: #888; margin-top: 4px; }
    label {
      display: block; font-size: 13px; font-weight: 600;
      color: #333; margin-bottom: 6px;
    }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #1F5EA8; }
    .btn-login {
      width: 100%; padding: 13px;
      background: #1F5EA8; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover    { background: #1b4b8c; }
    .btn-login:disabled { background: #93b4d9; cursor: not-allowed; }
    .error-msg {
      background: #fee2e2; color: #dc2626;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .back-link {
      display: block; text-align: center;
      margin-top: 20px; font-size: 13px; color: #888;
      text-decoration: none;
    }
    .back-link:hover { color: #1F5EA8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <img src="/static/backend/logo.png" alt="Anderson Diagnostics" onerror="this.style.display='none'">
      <h1>Anderson Diagnostics</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="error-msg" id="err"></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@anderson.com" autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()" />

    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    <a href="/" class="back-link">← Back to Home</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = "https://wriaonorqjhmofwrhqlp.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyaWFvbm9ycWpobW9md3JocWxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDM4MDAsImV4cCI6MjA4OTMxOTgwMH0.t6sS4orzoQmaVpEo84I0E2Ds3jDjDHNnfE4ZYPaPrfc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const params   = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/dashboard';

    // Already logged in → go straight to destination
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = redirect;
    });

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('err');
      const btn      = document.getElementById('login-btn');
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = 'Invalid email or password.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      // Read role from JWT metadata first, then profiles table
      let role     = data.user.user_metadata?.role || data.user.app_metadata?.role || null;
      let fullName = data.user.user_metadata?.full_name || null;

      if (!role) {
        const { data: profile } = await sb.from('profiles')
          .select('role, full_name')
          .eq('id', data.user.id)
          .maybeSingle();
        if (profile) { role = profile.role; fullName = fullName || profile.full_name; }
      }

      localStorage.setItem('tera_role',      role || 'user');
      localStorage.setItem('tera_user_name', fullName || email);

      window.location.href = redirect;
    }
  </script>
</body>
</html>
