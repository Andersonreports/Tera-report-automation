    <style>
        body {
            margin:0;
            font-family: 'Lato', sans-serif;
            background:#F58220; 
            padding:0;
            color: black;
        }
        header{
            position:relative;
            top:0;
            left:0;
            width:100%;
            z-index:10;
            margin:0;
            padding:0;
        }
        
        #intro {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            background-color: #fff0;
            padding: 1em;
            border: 1px solid #ccc;
        }
        #intro a.button {
            display: inline-block;
            margin-top: 1em;
            padding: 10px 20px;
            border: 2px solid black;
            text-decoration: none;
            color: black;
            transition: 0.3s;
        }
        #intro a.button:hover {
            background-color: #004080;
            color: white;
        }
        .image.logo {
            display:block;
            width:100%;
            position:fixed;
            top:0;
            left:0;
            z-index:100;
            line-height:0;
            background:#fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .image.logo img{
            width:100%;
            height:auto;
            max-height:100px;
            display:block;
            object-fit:contain;
            object-position: left center;
            background:transparent;
            }
        .inner {
            z-index: 2;
            margin-left:300px;
            margin-top:50px;
        }
        #intro h1 {
            color: rgb(255,255,255);
            font-size: 3em;
            margin-top: 2.5em;
            margin-bottom: 0.15em;
            margin-right: 0;
            margin-left: 0;
        }
        #intro p {
            font-size: 1.2em;
            margin-top: 0;
            margin-bottom: 0;
        }
        .center-section{
            margin-top:80px;
            text-align:center;
            margin-left:160px;
        }

        .report-grid{
            display:flex;
            justify-content:flex-start;
            gap:28px;
            margin-top:60px;
            margin-left:0;
            flex-wrap:wrap;
            padding:0;
            }

        .report-card{
        width:18px;
        height:18px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-decoration:none;
        background:white;
        border-radius:14px;
        box-shadow:0 4px 10px rgba(0,0,0,0.15);
        transition:0.2s;
        }

        .report-card:hover{
        transform:translateY(-6px);
        box-shadow:0 8px 18px rgba(0,0,0,0.25);
        }

        .report-card span{
        font-size:13px;
        font-weight:600;
        color:#333;
        text-align:center;
        }
        .report-card:hover{
        transform:translateY(-6px);
        box-shadow:0 10px 20px rgba(0,0,0,0.25);
        }
        .user-icon{
            width:34px;
            height:34px;
            border-radius:50%;
            object-fit:cover;
            }
</style>

<style>

<script>
    const userBtn = document.getElementById('userButton');
    const dropdown = document.querySelector('.dropdown-content');

    userBtn.addEventListener('click', function(e){
        e.preventDefault();
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    window.addEventListener('click', function(e){
        if (!userBtn.contains(e.target) && !dropdown.contains(e.target)){
            dropdown.style.display = 'none';
        }
    });
</script>

<script>
    const SUPABASE_URL  = "https://wriaonorqjhmofwrhqlp.supabase.co"
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyaWFvbm9ycWpobW9md3JocWxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDM4MDAsImV4cCI6MjA4OTMxOTgwMH0.t6sS4orzoQmaVpEo84I0E2Ds3jDjDHNnfE4ZYPaPrfc"
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

    // Check session on load
    sb.auth.getSession().then(({ data }) => {
        if (!data.session) {
            window.location.href = "/"
        } else {
            const role = localStorage.getItem("tera_role") || "user"
            const name = localStorage.getItem("tera_user_name") || data.session.user.email
            // Show name in user button tooltip
            const userBtn = document.getElementById("userButton")
            if (userBtn) userBtn.title = name + " (" + role + ")"
            // Set sidebar label to logged-in role
            const label = document.getElementById("sidebarUserLabel")
            if (label) label.textContent = role.charAt(0).toUpperCase() + role.slice(1)
            // Set dropdown role label
            const roleLabel = document.getElementById("userRoleLabel")
            if (roleLabel) roleLabel.textContent = role.charAt(0).toUpperCase() + role.slice(1)
            // Hide manage users option for non-admins
            if (role !== "admin") {
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none")
            }
        }
    })

    async function signOut() {
        await sb.auth.signOut()
        localStorage.removeItem("tera_role")
        localStorage.removeItem("tera_user_name")
        window.location.href = "/"
    }
</script>
